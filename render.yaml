# render.yaml — FlashRide backend service definition
# Commit this file to your repo root.
#
# HOW TO USE AS A BLUEPRINT (recommended):
#   Dashboard → New → Blueprint → connect repo → Render reads this file.
#
# HOW TO USE WITH A MANUALLY CREATED SERVICE:
#   Dashboard → your service → Settings → set these values manually:
#     Root Directory : server
#     Build Command  : npm ci && npm run build
#     Start Command  : node dist/index.js
#     Health Check   : /health
#
# Docs: https://render.com/docs/render-yaml-spec

services:
  - type: web
    name: flashride-api
    runtime: node
    # ── CRITICAL: tells Render to cd into server/ before doing anything ──
    rootDir: server
    buildCommand: npm ci && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    autoDeploy: true
    branch: main
    region: oregon
    plan: free

    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
